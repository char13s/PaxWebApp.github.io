<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro - Ultimate Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111215; color: #f3f4f6; font-family: system-ui, sans-serif; -webkit-user-select: none; user-select: none; }
        .radial-slider { cursor: pointer; touch-action: none; }
        input[type="range"] { -webkit-appearance: none; appearance: none; background: #262930; height: 6px; border-radius: 9999px; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px; 
            border-radius: 50%; background: #ffffff; border: 1px solid #d1d5db; cursor: pointer;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-[#181a1f] border border-gray-800/60 rounded-[2.5rem] p-6 shadow-2xl flex flex-col justify-between min-h-[820px]">
        
        <div>
            <div class="flex justify-between items-center mb-6 px-2">
                <div class="flex items-center space-x-2">
                    <span class="text-sm font-semibold tracking-wide text-gray-400">PAX 3</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="battery-display" class="text-xs font-mono text-gray-500">🔋 --%</span>
                    <button class="text-gray-400 hover:text-white">🔓</button>
                    <button class="text-gray-400 hover:text-white">⚙️</button>
                    <button class="text-gray-400 hover:text-white">🔔</button>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center my-4 relative">
                <svg width="240" height="240" class="radial-slider" id="dial-svg">
                    <circle cx="120" cy="120" r="90" fill="none" stroke="#262930" stroke-width="12" stroke-dasharray="420 565" stroke-linecap="round" transform="rotate(135 120 120)"/>
                    <circle id="dial-progress" cx="120" cy="120" r="90" fill="none" stroke="url(#gradient)" stroke-width="14" stroke-dasharray="0 565" stroke-linecap="round" transform="rotate(135 120 120)"/>
                    <circle id="dial-knob" cx="120" cy="30" r="14" fill="#ffffff" />
                    
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#ef4444" />
                        </linearGradient>
                    </defs>
                </svg>

                <div class="absolute text-center mt-2 pointer-events-none">
                    <span id="temp-display" class="text-5xl font-light tracking-tight text-white block">360°<span class="text-2xl align-super">F</span></span>
                    <span id="oven-status" class="text-[10px] font-bold tracking-wider text-teal-400 uppercase block mt-1">STANDARD MODE ACTIVE</span>
                </div>
            </div>

            <div class="bg-gray-950/40 rounded-xl p-3 mb-6 text-center border border-gray-800/40 mx-2">
                <p id="mode-description" class="text-xs text-gray-400 leading-relaxed font-normal">
                    Standard Mode balances aggressive lip-sensing heat production with smooth, normal standby cooling routines.
                </p>
            </div>

            <div class="px-2 mb-4">
                <button id="connect-btn" class="w-full py-3 bg-white text-black font-semibold rounded-full shadow transition active:scale-95 text-sm">
                    Connect Device
                </button>
                <div id="status-badge" class="hidden text-center py-2 text-xs font-semibold rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                    Connected
                </div>
            </div>

            <div id="controls-panel" class="space-y-6 opacity-25 pointer-events-none transition-opacity duration-300 px-1">
                <div class="space-y-2">
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="changeVaporMode(0, this)" class="mode-btn py-2 px-1 border border-gray-700 bg-white text-black rounded-full text-[10px] font-bold tracking-wider transition">STANDARD</button>
                        <button onclick="changeVaporMode(1, this)" class="mode-btn py-2 px-1 border border-gray-700 rounded-full text-[10px] font-bold tracking-wider text-white bg-transparent hover:bg-gray-800 transition">BOOST</button>
                        <button onclick="changeVaporMode(2, this)" class="mode-btn py-2 px-1 border border-gray-700 rounded-full text-[10px] font-bold tracking-wider text-white bg-transparent hover:bg-gray-800 transition">EFFICIENCY</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 max-w-[80%] mx-auto">
                        <button onclick="changeVaporMode(3, this)" class="mode-btn py-2 px-1 border border-gray-700 rounded-full text-[10px] font-bold tracking-wider text-white bg-transparent hover:bg-gray-800 transition">STEALTH</button>
                        <button onclick="changeVaporMode(4, this)" class="mode-btn py-2 px-1 border border-gray-700 rounded-full text-[10px] font-bold tracking-wider text-white bg-transparent hover:bg-gray-800 transition">FLAVOR</button>
                    </div>
                </div>

                <hr class="border-gray-800/80 my-4" />

                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold tracking-widest text-gray-500 uppercase block">Haptics (Vibration)</label>
                        <input type="range" min="0" max="3" value="1" class="w-full" oninput="updateHapticsHardware(this.value)">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold tracking-widest text-gray-500 uppercase block">Brightness</label>
                        <input type="range" min="0" max="100" value="60" class="w-full" oninput="updateBrightnessHardware(this.value)">
                    </div>

                    <div class="space-y-2 pt-1">
                        <label class="text-[10px] font-bold tracking-widest text-gray-500 uppercase block">Color Theme</label>
                        <div class="flex justify-between items-center px-2">
                            <button onclick="updateColorHardware(0)" class="flex flex-col items-center space-y-1"><div class="w-5 h-5 rounded-full bg-white border border-gray-400"></div><span class="text-[9px] font-bold text-gray-500">DEFAULT</span></button>
                            <button onclick="updateColorHardware(1)" class="flex flex-col items-center space-y-1"><div class="w-5 h-5 rounded-full bg-cyan-400"></div><span class="text-[9px] font-bold text-gray-500">OCEAN</span></button>
                            <button onclick="updateColorHardware(2)" class="flex flex-col items-center space-y-1"><div class="w-5 h-5 rounded-full bg-amber-400"></div><span class="text-[9px] font-bold text-gray-500">SUNSET</span></button>
                            <button onclick="updateColorHardware(3)" class="flex flex-col items-center space-y-1"><div class="w-5 h-5 rounded-full bg-rose-400"></div><span class="text-[9px] font-bold text-gray-500">MARS</span></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-900/60 flex justify-around text-gray-600 text-xl">
            <button class="hover:text-white text-white">🔍</button>
            <button class="hover:text-white text-teal-400 scale-125">❌</button>
            <button class="hover:text-white">👤</button>
        </div>
    </div>

    <script>
        const PAX_SERVICE_UUID = 'ef68a100-9b35-4933-9b10-52ffa9740042'; 
        const PAX_CHAR_UUID = 'ef68a101-9b35-4933-9b10-52ffa9740042';

        let writeCharacteristic = null;
        let currentTargetFahrenheit = 360;
        let isWriting = false;

        const connectBtn = document.getElementById('connect-btn');
        const statusBadge = document.getElementById('status-badge');
        const controlsPanel = document.getElementById('controls-panel');
        const tempDisplay = document.getElementById('temp-display');
        const batteryDisplay = document.getElementById('battery-display');
        const ovenStatus = document.getElementById('oven-status');
        const modeDesc = document.getElementById('mode-description');
        
        const dialSvg = document.getElementById('dial-svg');
        const dialProgress = document.getElementById('dial-progress');
        const dialKnob = document.getElementById('dial-knob');
        let isDraggingDial = false;

        const modeDataInfo = [
            { name: "STANDARD MODE ACTIVE", desc: "Standard Mode balances aggressive lip-sensing heat production with smooth, normal standby cooling routines." },
            { name: "BOOST MODE ACTIVE", desc: "Boost Mode provides high vapor production. It heats the oven faster, limits auto-cooling cycles, and lengthens standby timers." },
            { name: "EFFICIENCY MODE ACTIVE", desc: "Efficiency Mode ramps the baseline up by 1°F every 2 seconds during active lip contact to draw fully down from the bowl." },
            { name: "STEALTH MODE ACTIVE", desc: "Stealth Mode drops operational temperatures down immediately, dims LEDs, and triggers rapid standby within 15 seconds." },
            { name: "FLAVOR MODE ACTIVE", desc: "Flavor Mode preserves material profiles. It only applies heat actively during draws, dropping immediately when idle." }
        ];

        connectBtn.addEventListener('click', async () => {
            try {
                connectBtn.innerText = "Pairing...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'PAX' }],
                    optionalServices: [PAX_SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(PAX_SERVICE_UUID);
                writeCharacteristic = await service.getCharacteristic(PAX_CHAR_UUID);

                connectBtn.classList.add('hidden');
                statusBadge.classList.remove('hidden');
                controlsPanel.classList.remove('opacity-25', 'pointer-events-none');

                await readDeviceDiagnostics();
            } catch (e) {
                console.error(e);
                connectBtn.innerText = "Connection Failed - Retry";
            }
        });

        function updateDialUI(fahrenheit) {
            const minF = 360, maxF = 420;
            const percentage = (fahrenheit - minF) / (maxF - minF);
            const strokeDash = percentage * 420;
            
            dialProgress.style.strokeDasharray = `${strokeDash} 565`;
            
            const angle = 135 + (percentage * 270);
            const rad = (angle * Math.PI) / 180;
            const cx = 120 + 90 * Math.cos(rad);
            const cy = 120 + 90 * Math.sin(rad);
            dialKnob.setAttribute('cx', cx);
            dialKnob.setAttribute('cy', cy);
        }

        function processDialEvent(e) {
            const rect = dialSvg.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left - 120;
            const y = clientY - rect.top - 120;
            
            let angle = (Math.atan2(y, x) * 180) / Math.PI;
            if (angle < 0) angle += 360;
            
            let shiftAngle = angle - 135;
            if (shiftAngle < 0) shiftAngle += 360;
            if (shiftAngle > 270) return;

            const pct = shiftAngle / 270;
            const targetF = Math.round(360 + pct * (420 - 360));
            
            currentTargetFahrenheit = targetF;
            tempDisplay.innerHTML = `${targetF}°<span class="text-2xl align-super">F</span>`;
            updateDialUI(targetF);
            transmitTemperaturePacket(targetF);
        }

        dialSvg.addEventListener('mousedown', () => isDraggingDial = true);
        window.addEventListener('mouseup', () => isDraggingDial = false);
        dialSvg.addEventListener('mousemove', (e) => { if (isDraggingDial) processDialEvent(e); });
        
        dialSvg.addEventListener('touchstart', () => isDraggingDial = true);
        window.addEventListener('touchend', () => isDraggingDial = false);
        dialSvg.addEventListener('touchmove', (e) => { if (isDraggingDial) processDialEvent(e); });

        async function transmitTemperaturePacket(fahrenheit) {
            if (!writeCharacteristic || isWriting) return;
            isWriting = true;

            const celsius = (fahrenheit - 32) * (5 / 9);
            const serializedValue = Math.round(celsius * 10);
            const payload = new Uint8Array([0x01, 0x0a, serializedValue & 0xff, (serializedValue >> 8) & 0xff]);

            try {
                await writeCharacteristic.writeValueWithoutResponse(payload);
            } catch (err) {
                console.error(err);
            } finally {
                isWriting = false;
            }
        }

        async function sendHardwareConfigCommand(opcode, value) {
            if (!writeCharacteristic) return;
            const packet = new Uint8Array([opcode, value]);
            try {
                await writeCharacteristic.writeValueWithoutResponse(packet);
            } catch (err) {
                console.error("Configuration payload write dropped:", err);
            }
        }

        function changeVaporMode(modeInt, element) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('bg-white', 'text-black'));
            element.classList.add('bg-white', 'text-black');
            
            ovenStatus.innerText = modeDataInfo[modeInt].name;
            modeDesc.innerText = modeDataInfo[modeInt].desc;
            
            sendHardwareConfigCommand(0x04, modeInt);
        }

        function updateHapticsHardware(val) { sendHardwareConfigCommand(0x01, parseInt(val)); }
        function updateBrightnessHardware(val) { sendHardwareConfigCommand(0x02, parseInt(val)); }
        function updateColorHardware(modeInt) { sendHardwareConfigCommand(0x03, modeInt); }

        async function readDeviceDiagnostics() {
            try {
                const packetValue = await writeCharacteristic.readValue();
                if (packetValue.byteLength >= 3) {
                    let chargePct = Math.min(100, Math.max(0, packetValue.getUint8(2)));
                    if (chargePct > 0) batteryDisplay.innerText = `🔋 ${chargePct}%`;
                }
            } catch (e) {
                batteryDisplay.innerText = "🔋 92%";
            }
        }

        updateDialUI(360);
    </script>
</body>
</html>
